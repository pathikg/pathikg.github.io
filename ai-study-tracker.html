<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f11; color: #e2e2e5; min-height: 100vh; padding: 24px; }

  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 24px; }

  /* Overall progress */
  .progress-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 10px; padding: 16px; }
  .stat-label { font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
  .stat-sub { font-size: 0.78rem; color: #555; margin-top: 2px; }

  /* Progress bar */
  .progress-bar-wrap { background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 10px; padding: 16px; margin-bottom: 28px; }
  .progress-bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; margin-bottom: 8px; }
  .progress-bar { height: 8px; background: #2a2a32; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #a78bfa); border-radius: 4px; transition: width 0.4s ease; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 6px; padding: 6px 14px; font-size: 0.78rem; color: #888; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: #6c63ff; color: #a78bfa; }
  .filter-btn.active { background: #6c63ff22; border-color: #6c63ff; color: #a78bfa; }

  /* Category */
  .category { margin-bottom: 28px; }
  .category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; user-select: none; }
  .category-title { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #a78bfa; }
  .category-count { font-size: 0.72rem; color: #555; background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 10px; padding: 2px 8px; }
  .category-progress { font-size: 0.72rem; color: #666; margin-left: auto; }
  .collapse-icon { color: #555; font-size: 0.7rem; transition: transform 0.2s; }
  .collapsed .collapse-icon { transform: rotate(-90deg); }
  .collapsed .topics-list { display: none; }

  /* Topics table */
  .topics-list { background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 10px; overflow: hidden; }
  .topic-row { display: grid; grid-template-columns: 1fr 90px 90px 100px 60px; align-items: center; padding: 11px 16px; border-bottom: 1px solid #22222a; gap: 8px; transition: background 0.1s; }
  .topic-row:last-child { border-bottom: none; }
  .topic-row:hover { background: #1e1e26; }
  .topic-row.done-read { background: #0d1a1d; }
  .topic-row.done-all { background: #0d1a10; }

  .topic-name { font-size: 0.83rem; color: #ccc; }
  .topic-name a { color: inherit; text-decoration: none; }
  .topic-name a:hover { color: #a78bfa; }

  .col-header { display: grid; grid-template-columns: 1fr 90px 90px 100px 60px; padding: 8px 16px; gap: 8px; }
  .col-header span { font-size: 0.68rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
  .col-header span:not(:first-child) { text-align: center; }

  /* Checkboxes */
  .check-cell { display: flex; justify-content: center; align-items: center; }
  input[type="checkbox"] { appearance: none; width: 18px; height: 18px; border: 1.5px solid #3a3a45; border-radius: 4px; cursor: pointer; transition: all 0.15s; position: relative; flex-shrink: 0; }
  input[type="checkbox"]:checked { background: #6c63ff; border-color: #6c63ff; }
  input[type="checkbox"]:checked::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 11px; font-weight: 700; }
  input[type="checkbox"].content-check:checked { background: #22c55e; border-color: #22c55e; }
  input[type="checkbox"].notes-check:checked { background: #f59e0b; border-color: #f59e0b; }

  /* Day badge */
  .day-badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; background: #2a2a32; color: #666; text-align: center; white-space: nowrap; }
  .day-badge.phase1 { background: #1e1030; color: #a78bfa; }
  .day-badge.phase2 { background: #0d1a2e; color: #60a5fa; }
  .day-badge.ongoing { background: #1a1a0d; color: #ca8a04; }

  /* Legend */
  .legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Search */
  .search-wrap { margin-bottom: 16px; }
  .search-input { width: 100%; background: #1a1a1f; border: 1px solid #2a2a32; border-radius: 8px; padding: 10px 14px; color: #ccc; font-size: 0.85rem; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: #6c63ff; }
  .search-input::placeholder { color: #444; }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .topic-row, .col-header { grid-template-columns: 1fr 50px 50px 60px; }
    .day-col { display: none; }
    .progress-overview { grid-template-columns: 1fr 1fr; }
  }
</style>

let currentFilter = 'all';
const STORAGE_KEY = 'ai-tracker-v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getTopicId(topic) {
  return topic.name.replace(/\s+/g, '-').toLowerCase();
}

function renderAll() {
  const state = loadState();
  const searchVal = document.getElementById('search').value.toLowerCase();

  const cats = [...new Set(topics.map(t => t.cat))];
  const container = document.getElementById('topics-container');
  container.innerHTML = '';

  let totalRead = 0, totalNotes = 0, totalContent = 0, totalVisible = 0;

  cats.forEach(cat => {
    const catTopics = topics.filter(t => t.cat === cat);
    let visibleTopics = catTopics.filter(t => {
      const id = getTopicId(t);
      const s = state[id] || {};
      if (searchVal && !t.name.toLowerCase().includes(searchVal)) return false;
      if (currentFilter === 'unread') return !s.read;
      if (currentFilter === 'read') return s.read;
      if (currentFilter === 'no-notes') return !s.notes;
      if (currentFilter === 'no-content') return !s.content;
      if (currentFilter === 'phase1') return t.phase === 'phase1';
      if (currentFilter === 'phase2') return t.phase === 'phase2';
      return true;
    });

    if (visibleTopics.length === 0) return;

    const catRead = catTopics.filter(t => (state[getTopicId(t)] || {}).read).length;
    totalVisible += visibleTopics.length;
    totalRead += catTopics.filter(t => (state[getTopicId(t)] || {}).read).length;
    totalNotes += catTopics.filter(t => (state[getTopicId(t)] || {}).notes).length;
    totalContent += catTopics.filter(t => (state[getTopicId(t)] || {}).content).length;

    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    catDiv.innerHTML = `
      <div class="category-header" onclick="toggleCat(this)">
        <span class="collapse-icon">▼</span>
        <span class="category-title">${cat}</span>
        <span class="category-count">${catTopics.length} topics</span>
        <span class="category-progress">${catRead}/${catTopics.length} read</span>
      </div>
      <div class="col-header">
        <span>Topic</span>
        <span>Read</span>
        <span>Notes</span>
        <span>Content</span>
        <span class="day-col">Day</span>
      </div>
      <div class="topics-list" id="list-${cat.replace(/\W/g,'-')}">
        ${visibleTopics.map(t => {
          const id = getTopicId(t);
          const s = state[id] || {};
          const rowClass = s.read && s.notes && s.content ? 'done-all' : s.read ? 'done-read' : '';
          return `<div class="topic-row ${rowClass}" id="row-${id}">
            <div class="topic-name"><a href="${t.url}" target="_blank">${t.name}</a></div>
            <div class="check-cell"><input type="checkbox" ${s.read ? 'checked' : ''} onchange="toggle('${id}','read',this)" title="Mark as Read"></div>
            <div class="check-cell"><input type="checkbox" class="notes-check" ${s.notes ? 'checked' : ''} onchange="toggle('${id}','notes',this)" title="Notes Written"></div>
            <div class="check-cell"><input type="checkbox" class="content-check" ${s.content ? 'checked' : ''} onchange="toggle('${id}','content',this)" title="Content Published"></div>
            <div class="day-col"><span class="day-badge ${t.phase}">${t.day}</span></div>
          </div>`;
        }).join('')}
      </div>
    `;
    container.appendChild(catDiv);
  });

  // Update stats
  const total = topics.length;
  document.getElementById('stat-read').textContent = totalRead;
  document.getElementById('stat-read-sub').textContent = `of ${total} total`;
  document.getElementById('stat-notes').textContent = totalNotes;
  document.getElementById('stat-content').textContent = totalContent;
  const pct = total ? Math.round((totalRead / total) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function toggle(id, field, el) {
  const state = loadState();
  if (!state[id]) state[id] = {};
  state[id][field] = el.checked;
  saveState(state);
  // Update row class
  const row = document.getElementById('row-' + id);
  if (row) {
    const s = state[id];
    row.className = 'topic-row ' + (s.read && s.notes && s.content ? 'done-all' : s.read ? 'done-read' : '');
  }
  // Update stats
  renderStats();
}

function renderStats() {
  const state = loadState();
  const total = topics.length;
  const totalRead = topics.filter(t => (state[getTopicId(t)] || {}).read).length;
  const totalNotes = topics.filter(t => (state[getTopicId(t)] || {}).notes).length;
  const totalContent = topics.filter(t => (state[getTopicId(t)] || {}).content).length;
  document.getElementById('stat-read').textContent = totalRead;
  document.getElementById('stat-read-sub').textContent = `of ${total} total`;
  document.getElementById('stat-notes').textContent = totalNotes;
  document.getElementById('stat-content').textContent = totalContent;
  const pct = total ? Math.round((totalRead / total) * 100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function toggleCat(header) {
  header.parentElement.classList.toggle('collapsed');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function filterTopics() { renderAll(); }

renderAll();
</script>
